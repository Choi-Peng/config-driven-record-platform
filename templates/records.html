{% extends "base.html" %}
{% block title %}查看记录 — {{ site_title }}{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
        <h5 class="mb-0"><i class="bi bi-table"></i> 记录列表</h5>
        <div class="d-flex gap-2">
            <button type="button" class="btn btn-outline-secondary btn-sm" onclick="exportCsv()">
                <i class="bi bi-download"></i> 导出 CSV
            </button>
            <button type="button" class="btn btn-success btn-sm" onclick="loadRecords()">
                <i class="bi bi-arrow-clockwise"></i> 刷新
            </button>
        </div>
    </div>

    <div class="card mb-3">
        <div class="card-body py-2">
            <div class="row g-2">
                <div class="col-md-4">
                    <label class="form-label mb-1">环境页面</label>
                    <select class="form-select form-select-sm" id="filterFormPage">
                        <option value="">全部</option>
                        {% for p in form_pages %}
                        <option value="{{ p.key }}">{{ p.title }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label mb-1">开始日期</label>
                    <input class="form-control form-control-sm" id="filterStartDate" type="date">
                </div>
                <div class="col-md-3">
                    <label class="form-label mb-1">结束日期</label>
                    <input class="form-control form-control-sm" id="filterEndDate" type="date">
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button class="btn btn-outline-primary btn-sm w-100" onclick="loadRecords()">查询</button>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-sm table-striped table-hover mb-0" id="recordsTable">
                    <thead class="table-light" id="recordsHead">
                    </thead>
                    <tbody id="recordsBody">
                        <tr><td colspan="7" class="text-center text-muted py-4">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function esc(v) {
    return String(v ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll('"', "&quot;");
}

function formPageLabel(key) {
    const opts = Array.from(document.querySelectorAll("#filterFormPage option"));
    const hit = opts.find((o) => o.value === key);
    return hit ? hit.textContent : key;
}

let tableColumns = [];
let currentRows = [];
const selectedRecordKeys = new Set();

function rowKey(row) {
    return `${String(row.form_page || "")}:${Number(row.id || 0)}`;
}

function setRowChecked(key, checked) {
    if (checked) selectedRecordKeys.add(key);
    else selectedRecordKeys.delete(key);
    refreshSelectionHint();
}

function refreshSelectionHint() {
    const btn = document.querySelector('button[onclick="exportCsv()"]');
    if (!btn) return;
    const count = selectedRecordKeys.size;
    btn.innerHTML = `<i class="bi bi-download"></i> 导出 CSV${count ? `（已选 ${count}）` : ''}`;
}

async function loadTableColumns(formPage = '') {
    try {
        const qs = new URLSearchParams();
        if (formPage) qs.set('form_page', formPage);
        const suffix = qs.toString() ? `?${qs.toString()}` : '';
        const res = await fetch(`/api/records/columns${suffix}`);
        const data = await res.json();
        tableColumns = data.columns || [];
        renderTableHeader();
    } catch (error) {
        console.error('加载表格列配置失败:', error);
        // 使用默认列
        tableColumns = [
            { key: 'record_date', label: '日期', width: '100px' },
            { key: 'form_page', label: '环境', width: '80px' },
            { key: 'crop', label: '作物', width: '100px' },
            { key: 'fertilizer_name', label: '肥料', width: '120px' },
            { key: 'recorder', label: '记录人', width: '100px' },
            { key: 'image_count', label: '图片数', width: '80px' },
            { key: 'actions', label: '操作', width: '100px' }
        ];
        renderTableHeader();
    }
}

function renderTableHeader() {
    const thead = document.getElementById('recordsHead');
    if (!thead || !tableColumns.length) return;

    const checkAllHead = `<th style="width:40px"><input type="checkbox" id="checkAllRows" title="全选当前页"></th>`;
    const headerHtml = tableColumns.map(col =>
        `<th style="width: ${col.width || 'auto'}">${esc(col.label)}</th>`
    ).join('');

    thead.innerHTML = `<tr>${checkAllHead}${headerHtml}</tr>`;
    const checkAll = document.getElementById("checkAllRows");
    if (checkAll) {
        checkAll.checked = currentRows.length > 0 && currentRows.every((r) => selectedRecordKeys.has(rowKey(r)));
        checkAll.addEventListener("change", (e) => {
            const checked = !!e.target.checked;
            currentRows.forEach((r) => setRowChecked(rowKey(r), checked));
            document.querySelectorAll("input[data-record-key]").forEach((el) => {
                el.checked = checked;
            });
        });
    }
}

function renderTableRows(rows) {
    const body = document.getElementById('recordsBody');
    if (!body || !tableColumns.length) return;

    if (!rows.length) {
        body.innerHTML = `<tr><td colspan="${tableColumns.length + 1}" class="text-center text-muted py-4">暂无记录</td></tr>`;
        return;
    }

    body.innerHTML = rows.map(row => {
        const key = rowKey(row);
        const checked = selectedRecordKeys.has(key) ? "checked" : "";
        const cells = tableColumns.map(col => {
            if (col.key === 'actions') {
                return `<td>
                    <a class="btn btn-outline-secondary btn-sm me-1" href="/record/${encodeURIComponent(String(row.form_page || ""))}/${Number(row.id || 0)}">查看</a>
                    <button class="btn btn-outline-danger btn-sm" onclick="deleteRecord('${esc(String(row.form_page || ""))}', ${Number(row.id || 0)})">删除</button>
                </td>`;
            } else if (col.key === 'form_page') {
                return `<td>${esc(formPageLabel(String(row.form_page || "")))}</td>`;
            } else if (col.key === 'image_count') {
                return `<td>${Number(row.image_count || 0)}</td>`;
            } else {
                // 动态字段：尝试从row中获取值
                const value = row[col.key] || '';
                return `<td>${esc(String(value))}</td>`;
            }
        }).join('');

        return `<tr><td><input type="checkbox" data-record-key="${esc(key)}" ${checked}></td>${cells}</tr>`;
    }).join('');
    body.querySelectorAll("input[data-record-key]").forEach((el) => {
        el.addEventListener("change", () => {
            setRowChecked(String(el.dataset.recordKey || ""), !!el.checked);
            const checkAll = document.getElementById("checkAllRows");
            if (checkAll) {
                checkAll.checked = currentRows.length > 0 && currentRows.every((r) => selectedRecordKeys.has(rowKey(r)));
            }
        });
    });
}

async function loadRecords() {
    const body = document.getElementById("recordsBody");
    body.innerHTML = `<tr><td colspan="${tableColumns.length || 7}" class="text-center text-muted py-4">加载中...</td></tr>`;

    const qs = new URLSearchParams();
    const formPage = document.getElementById("filterFormPage").value;
    const startDate = document.getElementById("filterStartDate").value;
    const endDate = document.getElementById("filterEndDate").value;
    if (formPage) qs.set("form_page", formPage);
    if (startDate) qs.set("start_date", startDate);
    if (endDate) qs.set("end_date", endDate);

    await loadTableColumns(formPage);

    const suffix = qs.toString() ? `?${qs.toString()}` : '';
    const res = await fetch(`/api/records${suffix}`);
    const data = await res.json().catch(() => ({}));
    const rows = Array.isArray(data.records) ? data.records : [];
    currentRows = rows;

    renderTableRows(rows);
    renderTableHeader();
}

function exportCsv() {
    const qs = new URLSearchParams();
    const formPage = document.getElementById("filterFormPage").value;
    const startDate = document.getElementById("filterStartDate").value;
    const endDate = document.getElementById("filterEndDate").value;
    if (formPage) qs.set("form_page", formPage);
    if (startDate) qs.set("start_date", startDate);
    if (endDate) qs.set("end_date", endDate);
    selectedRecordKeys.forEach((k) => qs.append("selected", k));
    const suffix = qs.toString() ? `?${qs.toString()}` : "";
    window.location.href = `/export/csv${suffix}`;
}

async function deleteRecord(formPage, recordId) {
    if (!formPage || !recordId) return;
    if (!confirm("确认删除这条记录吗？")) return;
    const res = await fetch(`/api/records/${encodeURIComponent(formPage)}/${recordId}`, { method: "DELETE" });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || !data.success) {
        alert(data.detail || data.message || "删除失败");
        return;
    }
    loadRecords();
}

document.getElementById("filterFormPage").addEventListener("change", () => {
    loadRecords();
});
refreshSelectionHint();
loadRecords();
</script>
{% endblock %}
